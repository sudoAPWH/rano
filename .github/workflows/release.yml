name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Build .deb package
        run: cargo deb --target x86_64-unknown-linux-gnu --no-build

      - name: Create tarball
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar czf ../../../rano-linux-x86_64.tar.gz rano

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            rano-linux-x86_64.tar.gz
            target/debian/*.deb

  build-arch:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Syu --noconfirm rust cargo

      - name: Build release binary
        run: cargo build --release

      - name: Create PKGBUILD and package
        run: |
          # Create a non-root user for makepkg
          useradd -m builder
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p /tmp/pkg
          cp target/release/rano /tmp/pkg/
          cat > /tmp/pkg/PKGBUILD << EOF
          pkgname=rano
          pkgver=$VERSION
          pkgrel=1
          pkgdesc="A Rust rewrite of GNU nano - a small and user-friendly text editor"
          arch=('x86_64')
          license=('GPL')
          depends=('gcc-libs')
          options=('!debug')
          source=("rano")
          sha256sums=('SKIP')

          package() {
            install -Dm755 "\$srcdir/rano" "\$pkgdir/usr/bin/rano"
          }
          EOF
          chown -R builder:builder /tmp/pkg
          cd /tmp/pkg
          su builder -c "makepkg -f"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-artifact
          path: /tmp/pkg/*.pkg.tar.zst

  build-macos:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-x86_64
          - target: aarch64-apple-darwin
            name: macos-aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rano-${{ matrix.name }}.tar.gz rano

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifact
          path: rano-${{ matrix.name }}.tar.gz

  release:
    needs: [build-linux, build-arch, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Initial release of rano — a Rust rewrite of GNU nano.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Linux (generic) | `rano-linux-x86_64.tar.gz` |
            | Debian/Ubuntu | `.deb` package |
            | Arch Linux | `.pkg.tar.zst` package |
            | macOS (Apple Silicon) | `rano-macos-aarch64.tar.gz` |
            | macOS (Intel) | `rano-macos-x86_64.tar.gz` |
          files: |
            rano-linux-x86_64.tar.gz
            rano-macos-x86_64.tar.gz
            rano-macos-aarch64.tar.gz
            **/*.deb
            *.pkg.tar.zst
